<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Chronora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/AccountCreation.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/index.css') }}">
</head>
<body>
    <div id="container">
        <!-- Fundo decorativo (mesmo do Login) -->
        <div class="page-bg-auth">
            <img id="triangle-left" src="{{ url_for('static', filename='img/TriangleLeft.png') }}" alt="">
            <img class="hex" id="hex-left" src="{{ url_for('static', filename='img/Comb2.png') }}" alt="">
            <img class="hex" id="hex-right" src="{{ url_for('static', filename='img/Comb1.png') }}" alt="">
            <div class="gold-bar" id="bar-r1"></div>
            <div class="gold-bar" id="bar-r2"></div>
            <div class="gold-bar" id="bar-r3"></div>
            <div class="gold-bar" id="bar-l1"></div>
            <div class="gold-bar" id="bar-l2"></div>
        </div>

        <!-- Logo -->
        <div id="logo-area">
            <img src="{{ url_for('static', filename='img/LogoBackgroundYellow.png') }}" alt="Logo" id="logo-img">
            <span id="logo-text">Chronora</span>
        </div>

        <!-- Card do formulário -->
        <div id="container-form">
            <h1>Bem vindo!</h1>
            <form id="register-form">
                <input type="text" name="nome" id="input-name" placeholder="Nome completo" required autocomplete="off">
                <input type="email" name="email" id="input-email" placeholder="E-mail" required autocomplete="off">
                <input type="tel" name="celular" id="input-phone-number" placeholder="Número de celular" required autocomplete="off">
                <input type="password" name="senha" id="input-password" placeholder="Senha" required>
                <input type="password" name="confirmar_senha" id="input-confirm-password" placeholder="Confirmar Senha" required>

                <input type="file" id="input-file" accept=".pdf,.jpg,.jpeg,.png" style="display:none;">
                <button type="button" id="btn-annex">
                    <span>Documento com foto</span>
                    <img src="{{ url_for('static', filename='img/Import.png') }}" alt="" id="icon-import">
                </button>
                <span id="file-chosen"></span>

                <button type="submit" id="btn-register">Criar conta</button>
            </form>
            <a href="{{ url_for('login_page') }}" id="a-login">
                <button id="btn-login">Entrar</button>
            </a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/AccountCreation.js') }}"></script>
</body>
</html>
