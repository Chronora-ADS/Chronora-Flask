<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Pedido - Chronora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ViewService.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/index.css') }}">
</head>
<body>
    <div id="container-header">
        <div id="icon-left">
            <img id="icon-left-img" src="{{ url_for('static', filename='img/LogoBackgroundYellow.png') }}" alt="">
            <p id="icon-left-text">Chronora</p>
        </div>
        <div id="search-bar">
            <div class="search-container">
                <input type="text" placeholder="Pintura de parede, aula de inglês..." id="input-search-bar" autocomplete="off">
                <img src="{{ url_for('static', filename='img/Search.png') }}" alt="" class="icon-search">
            </div>
        </div>
        <div id="navbar-buttons">
            <a class="navbar-a" href="{{ url_for('service_creation_page') }}" title="Criar pedido"><img class="navbar-buttons-img" src="{{ url_for('static', filename='img/Plus.png') }}" alt=""></a>
            <div class="qty-chronos">
                <img class="qty-chronos-img" src="{{ url_for('static', filename='img/Coin.png') }}" alt="">
                <p class="qty-chronos-text" id="user-chronos-display">0</p>
            </div>
            <a class="navbar-a" href="" title="Pedidos"><img class="navbar-buttons-img" src="{{ url_for('static', filename='img/Briefcase.png') }}" alt=""></a>
            <a class="navbar-a" href="" title="Perfil"><img class="navbar-buttons-img" src="{{ url_for('static', filename='img/Profile.png') }}" alt=""></a>
            <a class="navbar-a" href="" title="Configurações"><img class="navbar-buttons-img" src="{{ url_for('static', filename='img/Settings.png') }}" alt=""></a>
        </div>
    </div>

    <div class="page-bg">
        <img class="hex-deco" id="hex-vs-left" src="{{ url_for('static', filename='img/Comb3.png') }}" alt="">
    </div>

    <div id="vs-wrapper">
        <div id="vs-layout">
            <section id="vs-left">
                <div id="vs-title-overlay">
                    <h1 id="service-title">Carregando...</h1>
                </div>
                <div id="vs-content-box">
                    <div id="vs-image-box">
                        <img id="service-image" src="{{ url_for('static', filename='img/default-service.png') }}" alt="Imagem do pedido">
                    </div>
                    <div id="vs-description-box">
                        <p id="service-description">Carregando descrição...</p>
                    </div>
                </div>
            </section>

            <aside id="vs-right">
                <div id="vs-categories">
                    <div id="categories-container" class="vs-tag-list"></div>
                </div>

                <div id="service-meta-box" class="vs-card" style="display:none;">
                    <p id="service-deadline-line" class="vs-meta-line"></p>
                    <p id="service-modality-line" class="vs-meta-line"></p>
                </div>

                <div id="vs-chronos-box" class="vs-card vs-chronos">
                    <img src="{{ url_for('static', filename='img/Coin.png') }}" alt="" class="vs-coin-icon">
                    <div>
                        <span id="chronos-value" class="vs-chronos-value">-</span>
                        <span class="vs-chronos-label"> Chronos</span>
                    </div>
                </div>

                <div id="vs-user-box" class="vs-card">
                    <p class="vs-posted-label">Postado às <strong id="post-time">--:--</strong> por:</p>
                    <div class="vs-user-row">
                        <img src="{{ url_for('static', filename='img/Profile.png') }}" alt="" class="vs-user-icon">
                        <div>
                            <span id="user-name" class="vs-user-name">-</span>
                            <div class="vs-rating">
                                <span id="user-rating" class="vs-rating-value">4.9</span><span class="vs-star">★</span>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="btn-accept-request">Aceitar pedido</button>

                <div id="owner-actions" style="display:none;">
                    <button id="btn-edit-service" class="btn-edit-service">Editar Pedido</button>
                    <button id="btn-delete-service" class="btn-delete-service">Excluir Pedido</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/ViewService.js') }}"></script>
</body>
</html>
