<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Pedido - Chronora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ServiceCreation.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/index.css') }}">
</head>
<body>
    <!-- Header -->
    <div id="container-header">
        <div id="icon-left">
            <img id="icon-left-img" src="{{ url_for('static', filename='img/LogoBackgroundYellow.png') }}" alt="">
            <p id="icon-left-text">Chronora</p>
        </div>
        <div id="search-bar">
            <div class="search-container">
                <input type="text" placeholder="Pintura de parede, aula de inglês..." id="input-search-bar" autocomplete="off">
                <img src="{{ url_for('static', filename='img/Search.png') }}" alt="" class="icon-search">
            </div>
        </div>
        <div id="navbar-buttons">
            <div class="qty-chronos">
                <img class="qty-chronos-img" src="{{ url_for('static', filename='img/Coin.png') }}" alt="">
                <p class="qty-chronos-text">0</p>
            </div>
            <a class="navbar-a" href="" title="Perfil"><img class="navbar-buttons-img" src="{{ url_for('static', filename='img/Profile.png') }}" alt=""></a>
            <a class="navbar-a" href="" title="Configurações"><img class="navbar-buttons-img" src="{{ url_for('static', filename='img/Settings.png') }}" alt=""></a>
        </div>
    </div>

    <!-- Hexágonos -->
    <div class="page-bg">
        <img class="hex-deco" id="hex-sc-left" src="{{ url_for('static', filename='img/Comb5.png') }}" alt="">
        <img class="hex-deco" id="hex-sc-right" src="{{ url_for('static', filename='img/Comb6.png') }}" alt="">
        <div class="gold-bar" id="sc-bar-r1"></div>
        <div class="gold-bar" id="sc-bar-l1"></div>
    </div>

    <!-- Modal/Card centralizado -->
    <div id="page-wrapper">
        <div id="form-card">
            <h1>Criação do pedido</h1>
            <form id="register-form" autocomplete="off" novalidate>

                <div class="form-group">
                    <div class="field-with-error">
                        <input type="text" id="input-title" placeholder="Título" required autocomplete="off">
                        <span class="error-symbol" id="title-error">⊝</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="field-with-error">
                        <textarea id="input-description" placeholder="Descrição" required autocomplete="off"></textarea>
                        <span class="error-symbol" id="description-error">⊝</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="field-with-error">
                        <input type="number" min="1" max="100" id="input-time-chronos" placeholder="Tempo em Chronos" required autocomplete="off">
                        <span class="error-symbol" id="time-error">⊝</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="field-with-error">
                        <input type="text" id="input-category" placeholder="Categoria(s)" autocomplete="off">
                        <span class="error-symbol" id="category-error">⊝</span>
                    </div>
                    <div id="category-tag-list" class="tag-list"></div>
                </div>

                <div class="form-group">
                    <div class="field-with-error two-col optional-row">
                        <input type="date" id="input-deadline" autocomplete="off">
                        <select id="input-modality">
                            <option value="">Modalidade</option>
                            <option value="Presencial">Presencial</option>
                            <option value="Remoto">Remoto</option>
                            <option value="Híbrido">Híbrido</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <input type="file" id="input-service-image" accept=".jpg,.jpeg,.png" style="display:none;">
                    <button type="button" id="btn-service-image">
                        <span class="btn-text">Imagem do pedido</span>
                        <img src="{{ url_for('static', filename='img/AddImage.png') }}" alt="" id="icon-service-image">
                    </button>
                    <span id="service-image-chosen"></span>
                </div>

                <div id="bottom-btns">
                    <a href="{{ url_for('main_page') }}" id="btn-cancel" class="btn-cancel-link">Cancelar</a>
                    <button type="submit" id="btn-register">Criar pedido</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/ServiceCreation.js') }}"></script>
</body>
</html>
