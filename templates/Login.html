<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chronora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/index.css') }}">
</head>
<body>
    <div id="container">
        <!-- Fundo decorativo -->
        <div class="page-bg-auth">
            <img id="triangle-left" src="{{ url_for('static', filename='img/TriangleLeft.png') }}" alt="">
            <!-- Hexágonos -->
            <img class="hex" id="hex-left" src="{{ url_for('static', filename='img/Comb2.png') }}" alt="">
            <img class="hex" id="hex-right" src="{{ url_for('static', filename='img/Comb1.png') }}" alt="">
            <!-- Retângulos dourados direita -->
            <div class="gold-bar" id="bar-r1"></div>
            <div class="gold-bar" id="bar-r2"></div>
            <div class="gold-bar" id="bar-r3"></div>
            <!-- Retângulos dourados esquerda-baixo -->
            <div class="gold-bar" id="bar-l1"></div>
            <div class="gold-bar" id="bar-l2"></div>
        </div>

        <!-- Logo no canto superior esquerdo -->
        <div id="logo-area">
            <img src="{{ url_for('static', filename='img/LogoBackgroundYellow.png') }}" alt="Logo" id="logo-img">
            <span id="logo-text">Chronora</span>
        </div>

        <!-- Card do formulário -->
        <div id="container-form">
            <h1>Bem vindo!</h1>
            <form id="login-form">
                <input type="email" name="email" id="input-email" placeholder="CPF" required autocomplete="off">
                <input type="password" name="senha" id="input-password" placeholder="Senha" required>

                <div id="bottom-inputs-container">
                    <div class="remember-row">
                        <input type="checkbox" name="remember-me" id="checkbox-remember" class="checkbox">
                        <label for="checkbox-remember">Lembre-se de mim</label>
                    </div>
                    <a href="#" id="a-forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" id="btn-login">Entrar</button>
            </form>
            <a href="{{ url_for('register_page') }}" id="a-register">
                <button id="btn-register">Criar conta</button>
            </a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/Login.js') }}"></script>
</body>
</html>
